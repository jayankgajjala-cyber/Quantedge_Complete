# ═══════════════════════════════════════════════════════════════════
#  Quantedge Trading System — Render Platform Configuration
#  render.yaml (place in repository root)
#
#  Deploy: Connect GitHub repo to Render → Auto-detects this file
# ═══════════════════════════════════════════════════════════════════

services:
  # ── FastAPI Backend ────────────────────────────────────────────────
  - type: web
    name: quantedge-backend
    runtime: python
    region: singapore        # Closest to India for NSE latency
    plan: starter            # $7/month — never sleeps (REQUIRED for scheduler)
    # plan: free             # ⚠ Free tier sleeps after 15min — use UptimeRobot if selected

    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r backend/requirements.txt

    startCommand: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port $PORT
      --workers 1
      --log-level info

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # ── Database (set to your Supabase URL in Render dashboard) ────
      - key: DATABASE_URL
        sync: false           # Set in Render dashboard — never in this file

      # ── Parquet cache — use /tmp on ephemeral Render filesystem ────
      - key: PARQUET_CACHE_DIR
        value: /tmp/parquet

      # ── Application ────────────────────────────────────────────────
      - key: DEBUG
        value: "false"
      - key: APP_VERSION
        value: "9.1.0"

      # ── JWT (set stable key in Render dashboard) ───────────────────
      - key: JWT_SECRET_KEY
        sync: false           # REQUIRED — generate once: python -c "import secrets; print(secrets.token_hex(32))"
      - key: JWT_EXPIRE_MINUTES
        value: "60"

      # ── Auth (can keep defaults or override) ──────────────────────
      - key: AUTH_USERNAME
        value: "Jayank8294"
      - key: AUTH_PASSWORD
        sync: false           # Set in Render dashboard

      # ── OTP / Email delivery ───────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: OTP_SENDER_EMAIL
        sync: false
      - key: OTP_RECIPIENT_EMAIL
        value: "jayankgajjala@gmail.com"

      # ── Gmail alerts ───────────────────────────────────────────────
      - key: ALERT_EMAIL_FROM
        sync: false
      - key: ALERT_EMAIL_TO
        value: "jayankgajjala@gmail.com"
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"

      # ── AI / NLP ───────────────────────────────────────────────────
      - key: HF_API_KEY
        sync: false
      - key: FINBERT_MODEL
        value: "ProsusAI/finbert"
      - key: SUMMARIZER_MODEL
        value: "facebook/bart-large-cnn"

      # ── News APIs ──────────────────────────────────────────────────
      - key: NEWS_API_KEY
        sync: false
      - key: NEWS_CACHE_TTL_SECS
        value: "3600"

      # ── Scraper proxy (optional but recommended) ───────────────────
      - key: SCRAPERAPI_KEY
        sync: false           # Leave empty to use direct scraping

      # ── CORS — set to your exact Vercel URL ───────────────────────
      - key: CORS_ORIGINS
        sync: false           # e.g. https://quantedge.vercel.app

      - key: FRONTEND_BASE_URL
        sync: false           # e.g. https://quantedge.vercel.app

      # ── Budget & Scheduler ────────────────────────────────────────
      - key: MONTHLY_BUDGET_INR
        value: "15000"
      - key: ALERT_CONFIDENCE_THRESHOLD
        value: "85.0"
      - key: MAX_ALERTS_PER_DAY
        value: "3"
      - key: HEARTBEAT_INTERVAL_SECS
        value: "300"

      # ── Thresholds ─────────────────────────────────────────────────
      - key: SENTIMENT_NEGATIVE_THRESHOLD
        value: "-0.6"
      - key: SENTIMENT_POSITIVE_THRESHOLD
        value: "0.6"
      - key: MIN_YEARS_SUFFICIENT
        value: "10"
      - key: MIN_YEARS_CONFIDENCE
        value: "2"

    # ── Disk (Render Starter+ only) ────────────────────────────────
    # Uncomment to get persistent 1GB disk for parquet cache
    # disk:
    #   name: parquet-cache
    #   mountPath: /data/cache/parquet
    #   sizeGB: 1

# ─────────────────────────────────────────────────────────────────────
# NOTES:
#   1. All keys marked sync:false must be set in Render Dashboard
#      Services → quantedge-backend → Environment
#   2. Use Render's "Secret Files" for bulk .env upload
#   3. Free tier: add UptimeRobot ping to /health every 5 minutes
# ─────────────────────────────────────────────────────────────────────
